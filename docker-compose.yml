version: "3.8"

services:
  elainabot:
    image: elainabot/elainabot:latest
    container_name: elainabot_v2
    restart: unless-stopped
    ports:
      - "5200:5200"
    volumes:
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./modules:/app/modules
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
