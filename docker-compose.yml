version: "3.8"

services:
  elainabot:
    image: elainabot/elainabot:latest
    container_name: elainabot_v2
    restart: unless-stopped
    ports:
      - "5200:5200"
    volumes:
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./modules:/app/modules
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    tty: true
    stdin_open: true
    # 首次启动自动补充配置模板
    command: >
      sh -c "
        if [ ! -f /app/config/settings.example.yaml ]; then
          cp /app/config.defaults/*.example.yaml /app/config/ 2>/dev/null || true
        fi &&
        exec python main.py
      "
